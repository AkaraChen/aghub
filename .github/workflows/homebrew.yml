name: Publish to Homebrew
on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            version:
                description: "Version tag (e.g., v1.0.0)"
                required: true
                type: string

jobs:
    update-tap:
        name: Update Homebrew Tap
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Homebrew Tap
              uses: actions/checkout@v4
              with:
                  repository: "Fldicoahkiin/homebrew-tap"
                  token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
                  path: tap

            - name: Update Formula and Cask
              env:
                  VERSION: ${{ github.event.inputs.version || github.event.release.tag_name }}
              run: |
                  VERSION="${VERSION#v}"
                  echo "Updating for version: ${VERSION}"

                  # Download CLI assets to compute checksums
                  echo "Downloading CLI assets..."
                  wget -q "https://github.com/AkaraChen/aghub/releases/download/v${VERSION}/aghub-cli-x86_64-apple-darwin.tar.gz" -O aghub-cli_mac_intel.tar.gz || echo "Failed to download x86_64 CLI"
                  wget -q "https://github.com/AkaraChen/aghub/releases/download/v${VERSION}/aghub-cli-aarch64-apple-darwin.tar.gz" -O aghub-cli_mac_arm.tar.gz || echo "Failed to download aarch64 CLI"
                  wget -q "https://github.com/AkaraChen/aghub/releases/download/v${VERSION}/aghub-cli-x86_64-unknown-linux-gnu.tar.gz" -O aghub-cli_linux.tar.gz || echo "Failed to download linux CLI"

                  AGENT_MAC_INTEL_SHA=$(sha256sum aghub-cli_mac_intel.tar.gz | awk '{print $1}')
                  AGENT_MAC_ARM_SHA=$(sha256sum aghub-cli_mac_arm.tar.gz | awk '{print $1}')
                  AGENT_LINUX_SHA=$(sha256sum aghub-cli_linux.tar.gz | awk '{print $1}')

                  cat << EOF > tap/aghub-cli.rb
                  class AghubCli < Formula
                    desc "AI coding agent configuration management tool (CLI)"
                    homepage "https://github.com/AkaraChen/aghub"
                    version "${VERSION}"
                    license "MIT"

                    on_macos do
                      if Hardware::CPU.arm?
                        url "https://github.com/AkaraChen/aghub/releases/download/v#{version}/aghub-cli-aarch64-apple-darwin.tar.gz"
                        sha256 "${AGENT_MAC_ARM_SHA}"
                      else
                        url "https://github.com/AkaraChen/aghub/releases/download/v#{version}/aghub-cli-x86_64-apple-darwin.tar.gz"
                        sha256 "${AGENT_MAC_INTEL_SHA}"
                      end
                    end

                    on_linux do
                      if Hardware::CPU.intel?
                        url "https://github.com/AkaraChen/aghub/releases/download/v#{version}/aghub-cli-x86_64-unknown-linux-gnu.tar.gz"
                        sha256 "${AGENT_LINUX_SHA}"
                      end
                    end

                    def install
                      bin.install "aghub-cli"
                    end

                    test do
                      system "#{bin}/aghub-cli", "--version"
                    end
                  end
                  EOF

                  # Download Desktop assets to compute checksums
                  echo "Downloading Desktop App assets..."
                  wget -q "https://github.com/AkaraChen/aghub/releases/download/v${VERSION}/aghub_${VERSION}_x64.dmg" -O aghub_mac_intel.dmg || echo "Failed to download x64 dmg"
                  wget -q "https://github.com/AkaraChen/aghub/releases/download/v${VERSION}/aghub_${VERSION}_aarch64.dmg" -O aghub_mac_arm.dmg || echo "Failed to download aarch64 dmg"

                  AGHUB_MAC_INTEL_SHA=$(sha256sum aghub_mac_intel.dmg | awk '{print $1}')
                  AGHUB_MAC_ARM_SHA=$(sha256sum aghub_mac_arm.dmg | awk '{print $1}')

                  mkdir -p tap/Casks
                  cat << EOF > tap/Casks/aghub.rb
                  cask "aghub" do
                    arch arm: "aarch64", intel: "x64"

                    version "${VERSION}"
                    sha256 arm:   "${AGHUB_MAC_ARM_SHA}",
                           intel: "${AGHUB_MAC_INTEL_SHA}"

                    url "https://github.com/AkaraChen/aghub/releases/download/v#{version}/aghub_#{version}_#{arch}.dmg"
                    name "aghub"
                    desc "AI coding agent configuration management tool (Desktop App)"
                    homepage "https://github.com/AkaraChen/aghub"

                    app "aghub.app"

                    zap trash: [
                      "~/Library/Application Support/com.akrc.aghub",
                      "~/Library/Preferences/com.akrc.aghub.plist",
                      "~/Library/Saved Application State/com.akrc.aghub.savedState"
                    ]
                  end
                  EOF

            - name: Commit and Push
              run: |
                  cd tap
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add aghub-cli.rb Casks/aghub.rb
                  git commit -m "Update Homebrew formula and cask for aghub v${{ github.event.inputs.version || github.event.release.tag_name }}" || echo "No changes to commit"
                  git push
